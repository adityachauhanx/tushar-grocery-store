<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register | Tushar Grocery Store</title>

    <link rel="stylesheet" href="register.css">

</head>

<body>

    <div class="auth-container">

        <div class="auth-box">

            <div class="logo">

                🛒

                <h2>Tushar Grocery Store</h2>

            </div>

            <h1>Create Account</h1>

            <p class="subtitle">

                Register to continue shopping

            </p>

            <!-- Name -->

            <div class="input-group">

                <label>Full Name</label>

                <input type="text" id="regName" placeholder="Enter Full Name">

            </div>

            <!-- Email / Mobile -->

            <div class="input-group">

                <label>Email / Mobile</label>

                <input type="text" id="loginId" placeholder="Email or Mobile Number">

            </div>

            <!-- Send OTP -->

            <button class="otp-btn" onclick="sendOTP()">

                Send OTP

            </button>

            <!-- OTP -->

            <div class="input-group">

                <label>OTP</label>

                <input type="text" id="otp" placeholder="Enter OTP">

            </div>

            <!-- Verify OTP -->

            <button class="verify-btn" onclick="verifyOTP()">

                Verify OTP

            </button>

            <!-- Password -->

            <div class="input-group">

                <label>Password</label>

                <input type="password" id="regPassword" placeholder="Create Password">

            </div>

            <!-- Register -->

            <button class="register-btn" onclick="registerUser()">

                Register

            </button>

            <div class="bottom-text">

                Already have an account?

                <a href="login.html">

                    Login Here

                </a>

            </div>

            <div class="back-home">

                <a href="index.html">

                    ⬅ Back to Home

                </a>

            </div>

        </div>

    </div>

    <script src="register.js"></script>

</body>

</html>
