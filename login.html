<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | Tushar Grocery Store</title>

    <link rel="stylesheet" href="login.css">

</head>

<body>

    <div class="auth-container">

        <div class="auth-box">

            <div class="logo">

                🛒

                <h2>Tushar Grocery Store</h2>

            </div>

            <h1>Welcome Back</h1>

            <p class="subtitle">

                Login to continue shopping

            </p>

            <!-- Login ID -->

            <div class="input-group">

                <label>Email / Mobile</label>

                <input type="text" id="loginId" placeholder="Enter Email or Mobile Number" autocomplete="username">

            </div>

            <!-- Password -->

            <div class="input-group">

                <label>Password</label>

                <input type="password" id="loginPassword" placeholder="Enter Password" autocomplete="current-password">

            </div>

            <!-- Show Password -->

            <div class="show-password">

                <input type="checkbox" id="showPassword">

                <label for="showPassword">

                    Show Password

                </label>

            </div>

            <!-- Login Button -->

            <button class="login-btn" onclick="loginUser()">

                Login

            </button>

            <!-- Register Link -->

            <div class="bottom-text">

                Don't have an account?

                <a href="register.html">

                    Register Here

                </a>

            </div>

            <!-- Home -->

            <div class="back-home">

                <a href="index.html">

                    ⬅ Back to Home

                </a>

            </div>

        </div>

    </div>

    <script src="login.js"></script>

</body>

</html>
